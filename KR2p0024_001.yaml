body:
  text: 君子之於教也其導民也不浸則其淳也弗深矣是故亡乎其身而存乎其詞雖厚其令民弗從之矣是故威服刑罰之屢行也由上之弗身也昔者君子有言曰戰與刑人君子之墜德也是故上苟身服之則民必有甚焉者君袀冕而立於阼一宮之人不勝其敬君衰絰而處位一宮之人不勝其哀君冠胄帶甲而立於軍上苟倡之則民鮮不從矣雖然其存也不厚其重也弗多矣是故君子之求諸己也深不求諸其本而攻諸其末弗得矣是故君子之於言也非從末流者之貴窮源反本者之貴苟不從其由不反其本未有可得也者君上享成不唯本功弗就矣農夫務食不強耕糧弗足矣士成言不行名弗得矣是故君子之於言也非從末流者之貴窮源反本者之貴苟不從其由不反其本雖強之弗入矣上不以其道民之從之也難是以民可敬導也而不可掩抑也可御也而不可牽也故君子不貴庶物而貴與民有同也智而比次則民欲其智之遂也富而分賤則民欲其富之大也貴而能讓則民欲其貴之上也反此道也民必因此重也以報之可不慎乎故君子所報之不多所求之不遠察反諸己而可以知人是故欲人之愛己也則必先愛人欲人之敬己也則必先敬人天降大常以理人倫制為君臣之義著為父子之親分為夫婦之辨是故小人亂天常以逆大道君子治人倫以順天德大禹曰余茲度宅天心何此言也舍之此而度宅於天心也是故君子簟席之上讓而授幼朝廷之位讓而處賤所度宅不遠矣小人不逞人於忍君子不逞人於禮津梁爭舟其先也不若其後也言語較之其勝也不若其已也君子曰從允釋過則先者除來者信君奭曰襄我二人毋有合在音何道不悅之詞也君子曰雖有其恆而可能終之為難槁木三年不必為封旗何言陳挾達之也是以君子貴成之聞之曰古之用民者求之於己為恆行不信則命不從信不著則言不樂民不從上之命不信其言而能含德者未之有也故君子之蒞民也身服善以先之敬慎以守之其所存者入矣民孰弗從形於中發於色其蕩睟也固矣民孰弗信是以上之恆務在信於衆詔命曰允師濟德何此言也言信於衆之時可以濟德也聖人之性與中人之性其生而未有非別之節於儒而此也則猶是也雖其於善道也亦非有擇數以多也及其博長而厚大也則聖人不可猶豫憚之此以民皆有性而聖人不可慕也是故凡物在疾之君奭曰惟冒丕單稱德何言疾也君子曰疾之行之不疾未有能深之者也勉之遂也強之工也陳之淹也辭之工也是以智而求之不疾其去人弗遠矣勇而行之不果其疑也弗往匡矣唯君子道可近求而可遠措也昔者君子有言曰聖人天德何言慎求之於己而可以至順天常矣康誥曰不還大戛文王作罰刑茲亡赦何此言也言不逆大常者文王之刑莫重焉是故君子慎六位以祀天常
